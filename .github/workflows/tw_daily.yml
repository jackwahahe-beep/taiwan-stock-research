name: 台股每日掃描

on:
  schedule:
    - cron: '0 1 * * 1-5'    # 盤前 台灣 09:00（UTC+8 → 01:00 UTC）；GitHub 排程通常 <5 分鐘延遲
    - cron: '30 6 * * 1-5'   # 盤後 台灣 14:30（UTC+8 → 06:30 UTC）；13:30 收盤後留 1h 等 Yahoo Finance 更新日線
  workflow_dispatch:          # 手動觸發（測試用）

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝套件
        run: pip install -r requirements.txt

      - name: 還原回測快取
        uses: actions/cache@v4
        with:
          path: cache/
          key: tw-cache-${{ github.run_id }}
          restore-keys: |
            tw-cache-

      - name: 執行掃描
        run: python tw_scheduler.py
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: 失敗通知
        if: failure()
        run: |
          python -c "
          import os, requests
          url = os.environ.get('DISCORD_WEBHOOK_URL','')
          if url:
              requests.post(url, json={'content': '⚠️ **台股每日掃描失敗** — GitHub Actions 執行錯誤，請至 Actions 頁面查看 log'}, timeout=10)
          "
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
