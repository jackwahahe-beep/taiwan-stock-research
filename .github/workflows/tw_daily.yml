name: 台股每日掃描

on:
  schedule:
    - cron: '30 23 * * 0-4'  # 盤前 目標09:30台灣時間；提前到07:30觸發，預留2h GitHub延遲 (UTC 23:30 Sun–Thu)
    - cron: '0 4 * * 1-5'    # 盤後 目標14:00台灣時間；提前到12:00觸發，預留2h GitHub延遲 (UTC 04:00 Mon–Fri)
  workflow_dispatch:          # 手動觸發（測試用）

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝套件
        run: pip install -r requirements.txt

      - name: 還原回測快取
        uses: actions/cache@v4
        with:
          path: cache/
          key: tw-cache-${{ github.run_id }}
          restore-keys: |
            tw-cache-

      - name: 執行掃描
        run: python tw_scheduler.py
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
