name: 台股每日掃描

on:
  schedule:
    - cron: '0 1 * * 1-5'    # 台灣 09:00（UTC 01:00）
    - cron: '30 6 * * 1-5'   # 台灣 14:30（UTC 06:30）— 收盤後 1h 等 Yahoo 更新
  workflow_dispatch:          # 手動觸發

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝套件
        run: pip install -r requirements.txt

      - name: 還原掃描快取（scan_*.json 等歷史資料）
        uses: actions/cache/restore@v4
        with:
          path: cache/
          key: tw-scan-cache-never-exact-match
          restore-keys: |
            tw-scan-cache-

      - name: 執行掃描（含事後驗證）
        run: python tw_scheduler.py
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: 儲存掃描快取
        if: always()
        uses: actions/cache/save@v4
        with:
          path: cache/
          key: tw-scan-cache-${{ github.run_id }}

      - name: 失敗通知
        if: failure()
        run: |
          python -c "
          import os, requests
          url = os.environ.get('DISCORD_WEBHOOK_URL','')
          if url:
              requests.post(url, json={'content': '⚠️ **台股每日掃描失敗** — GitHub Actions 執行錯誤，請至 Actions 頁面查看 log'}, timeout=10)
          "
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
