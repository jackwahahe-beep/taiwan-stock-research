name: 台股每月參數掃描

on:
  schedule:
    - cron: '0 3 1 * *'  # 每月 1 日 11:00 台灣時間 (UTC+8 → 03:00 UTC)
  workflow_dispatch:       # 手動觸發

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 120   # 三層掃描約 60–90 分鐘
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝套件
        run: pip install -r requirements.txt

      - name: 還原回測快取（含上週 signal_backtest_*.json）
        uses: actions/cache/restore@v4
        with:
          path: cache/
          key: tw-cache-never-exact-match
          restore-keys: |
            tw-cache-

      - name: 三層參數掃描（regime / crash / 配比）
        run: python tw_scheduler.py --sweep
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: 儲存掃描快取（含 param_sweep_results.json）
        if: always()
        uses: actions/cache/save@v4
        with:
          path: cache/
          key: tw-cache-${{ github.run_id }}

      - name: 失敗通知
        if: failure()
        run: |
          python -c "
          import os, requests
          url = os.environ.get('DISCORD_WEBHOOK_URL','')
          if url:
              requests.post(url, json={'content': '⚠️ **台股每月參數掃描失敗** — GitHub Actions 執行錯誤，請至 Actions 頁面查看 log'}, timeout=10)
          "
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
