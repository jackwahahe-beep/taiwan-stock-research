# 信號參數
signals:
  rsi:
    period: 14
    oversold: 30       # RSI 低於此值 → 買入信號
    overbought: 70     # RSI 高於此值 → 賣出信號
  ma:
    fast: 20
    slow: 60
  volume_spike: 1.5    # 成交量為 20 日均量的倍數

# 買入建議預算（每筆建議投入金額，NT$）
trade_budget: 100000

# Discord Webhook
discord:
  webhook_url: "${DISCORD_WEBHOOK_URL}"
  mention_role: ""

